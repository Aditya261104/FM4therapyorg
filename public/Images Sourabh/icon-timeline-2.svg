<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
  <defs>
    <filter id="t2Shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.9"/>
      <feOffset dx="0.4" dy="1.2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Realistic skin gradient (palm) — warm tone with light from upper left -->
    <radialGradient id="t2Skin" cx="35%" cy="30%" r="80%">
      <stop offset="0%"   stop-color="#FFE3CC"/>
      <stop offset="55%"  stop-color="#F0B786"/>
      <stop offset="100%" stop-color="#9C6541"/>
    </radialGradient>
    <linearGradient id="t2SkinDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F0B786"/>
      <stop offset="100%" stop-color="#9C6541"/>
    </linearGradient>
    <!-- Trigger-point red glow (pain spot) -->
    <radialGradient id="t2Pain" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF6B6B"/>
      <stop offset="60%"  stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#8B1414"/>
    </radialGradient>
  </defs>

  <!-- Floor shadow -->
  <ellipse cx="32" cy="60" rx="22" ry="2" fill="#000" opacity="0.16"/>

  <!-- Concentric pulse rings (release radiating outward) -->
  <circle cx="20" cy="42" r="14" fill="none" stroke="#00984B" stroke-width="1.2" opacity="0.25"/>
  <circle cx="20" cy="42" r="10" fill="none" stroke="#00984B" stroke-width="1.6" opacity="0.45"/>

  <!-- Trigger point — glossy red dot -->
  <circle cx="20" cy="42" r="5"   fill="url(#t2Pain)" filter="url(#t2Shadow)"/>
  <circle cx="18.5" cy="40.5" r="1.5" fill="#FFFFFF" opacity="0.7"/>

  <!-- Forearm (back of hand connection) -->
  <path d="M50 50c0 6-4 10-9 10s-10-3-10-9V36c0-5 4-8 9-8s10 3 10 8z"
        fill="url(#t2Skin)" filter="url(#t2Shadow)"/>
  <!-- Forearm soft shadow underline -->
  <path d="M32 48c2 5 6 8 12 8" stroke="#9C6541" stroke-width="1.4"
        stroke-linecap="round" opacity="0.4" fill="none"/>

  <!-- Index finger extended (pressing the trigger point) -->
  <path d="M32 38c-2-1-4-2-7-1l-7 4c-1.5 0.7-1 3 0.6 3.5l8 2"
        fill="url(#t2SkinDark)" stroke="#7A4A2A" stroke-width="0.6" filter="url(#t2Shadow)"/>
  <!-- Fingernail hint -->
  <ellipse cx="19" cy="42" rx="2" ry="1.2" fill="#FFE3CC" opacity="0.85"/>

  <!-- Other fingers (curled, behind palm) — give the hand depth -->
  <path d="M40 30c0-2.5 4-2.5 4 0v8M46 28c0-2.5 4-2.5 4 0v10M51 30c0-2.5 4-2.5 4 0v8"
        stroke="#7A4A2A" stroke-width="2.6" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Thumb / palm crease -->
  <path d="M44 34c-1 4-4 6-8 6" stroke="#7A4A2A" stroke-width="0.8"
        stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
