<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" aria-hidden="true">
  <defs>
    <linearGradient id="a2Card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4FBB80"/>
      <stop offset="55%"  stop-color="#00984B"/>
      <stop offset="100%" stop-color="#005A2D"/>
    </linearGradient>
    <radialGradient id="a2CardGloss" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a2Skin" cx="35%" cy="30%" r="80%">
      <stop offset="0%"   stop-color="#FFE3CC"/>
      <stop offset="60%"  stop-color="#F0B786"/>
      <stop offset="100%" stop-color="#9C6541"/>
    </radialGradient>
    <linearGradient id="a2Hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5C3A21"/>
      <stop offset="100%" stop-color="#2A1810"/>
    </linearGradient>
    <!-- Casual shirt: soft sky blue -->
    <linearGradient id="a2Shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#A6D8EA"/>
      <stop offset="100%" stop-color="#3E6E83"/>
    </linearGradient>
    <!-- Laptop body: aluminium -->
    <linearGradient id="a2Lap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F2F4F6"/>
      <stop offset="100%" stop-color="#9CA4AC"/>
    </linearGradient>
    <linearGradient id="a2LapBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#CED2D8"/>
      <stop offset="100%" stop-color="#6E7680"/>
    </linearGradient>
    <!-- Screen glow -->
    <radialGradient id="a2Screen" cx="50%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#1B3953"/>
      <stop offset="100%" stop-color="#070E18"/>
    </radialGradient>
    <filter id="a2Shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.8"/>
      <feOffset dx="0.3" dy="1.2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="76" height="76" rx="18" fill="url(#a2Card)"/>
  <rect x="2" y="2" width="76" height="76" rx="18" fill="url(#a2CardGloss)"/>

  <ellipse cx="40" cy="68" rx="24" ry="2.4" fill="#000" opacity="0.2"/>

  <!-- Shirt + shoulders -->
  <path d="M22 50c0-8 8-14 18-14s18 6 18 14v4H22z" fill="url(#a2Shirt)" filter="url(#a2Shadow)"/>
  <!-- Shirt highlight -->
  <path d="M28 48c2-6 6-10 12-10" stroke="#FFFFFF" stroke-width="1.5" opacity="0.45" fill="none" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="36" y="30" width="8" height="9" rx="2" fill="url(#a2Skin)"/>
  <!-- Head -->
  <circle cx="40" cy="22" r="9" fill="url(#a2Skin)" filter="url(#a2Shadow)"/>
  <!-- Hair (modern side-swept) -->
  <path d="M31 18c0-6 5-10 9-10s9 4 9 10c-2-2-5-3-9-3-3 0-7 1-9 3z" fill="url(#a2Hair)"/>
  <path d="M32 16c2-1 4-1 6 0" stroke="#2A1810" stroke-width="0.6" opacity="0.6"/>
  <!-- Eyes (looking at screen, small glow) -->
  <ellipse cx="36.6" cy="22" rx="0.9" ry="1.2" fill="#1A1A1A"/>
  <ellipse cx="43.4" cy="22" rx="0.9" ry="1.2" fill="#1A1A1A"/>
  <!-- Subtle screen reflection on glasses-free face (lightening) -->
  <path d="M37 25h6" stroke="#7A3A28" stroke-width="0.7" opacity="0.4" stroke-linecap="round"/>

  <!-- Laptop screen lid -->
  <rect x="18" y="52" width="44" height="14" rx="2" fill="url(#a2Lap)" filter="url(#a2Shadow)"/>
  <rect x="20" y="54" width="40" height="10" rx="1" fill="url(#a2Screen)"/>
  <!-- Code lines on screen -->
  <path d="M23 57h14M23 60h20M23 63h10" stroke="#FFE082" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Apple-like notch indicator -->
  <circle cx="40" cy="65.5" r="0.6" fill="#FFFFFF" opacity="0.7"/>
  <!-- Laptop base (angled) -->
  <path d="M14 70h52l-4-4H18z" fill="url(#a2LapBase)"/>
  <!-- Trackpad sliver -->
  <rect x="30" y="68" width="20" height="0.8" rx="0.4" fill="#5A6068" opacity="0.6"/>
</svg>
