<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" aria-hidden="true">
  <defs>
    <linearGradient id="a3Card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4FBB80"/>
      <stop offset="55%"  stop-color="#00984B"/>
      <stop offset="100%" stop-color="#005A2D"/>
    </linearGradient>
    <radialGradient id="a3CardGloss" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Skin: slightly cooler / older tone -->
    <radialGradient id="a3Skin" cx="35%" cy="30%" r="80%">
      <stop offset="0%"   stop-color="#FFDEC4"/>
      <stop offset="60%"  stop-color="#E2A87A"/>
      <stop offset="100%" stop-color="#8C5A3A"/>
    </radialGradient>
    <!-- Gray hair: silver gradient -->
    <linearGradient id="a3Hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F4F4F4"/>
      <stop offset="60%"  stop-color="#BFBFBF"/>
      <stop offset="100%" stop-color="#7E7E7E"/>
    </linearGradient>
    <!-- Burgundy / warm sweater -->
    <linearGradient id="a3Sweater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#B8616E"/>
      <stop offset="100%" stop-color="#5C2A33"/>
    </linearGradient>
    <!-- Wooden cane -->
    <linearGradient id="a3Cane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C2925A"/>
      <stop offset="100%" stop-color="#6B4423"/>
    </linearGradient>
    <filter id="a3Shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.8"/>
      <feOffset dx="0.3" dy="1.2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="76" height="76" rx="18" fill="url(#a3Card)"/>
  <rect x="2" y="2" width="76" height="76" rx="18" fill="url(#a3CardGloss)"/>

  <!-- Floor shadow -->
  <ellipse cx="36" cy="70" rx="22" ry="2.4" fill="#000" opacity="0.2"/>

  <!-- Sweater / torso -->
  <path d="M16 70c0-12 8-20 20-20s20 8 20 20v6H16z" fill="url(#a3Sweater)" filter="url(#a3Shadow)"/>
  <!-- Sweater neckline -->
  <ellipse cx="36" cy="50" rx="6" ry="2.2" fill="#5C2A33"/>
  <!-- Knit lines -->
  <path d="M22 62h28M22 66h28M22 70h28" stroke="#5C2A33" stroke-width="0.6" opacity="0.55"/>

  <!-- Neck -->
  <rect x="32" y="44" width="8" height="9" rx="2" fill="url(#a3Skin)"/>
  <!-- Head -->
  <circle cx="36" cy="34" r="10" fill="url(#a3Skin)" filter="url(#a3Shadow)"/>
  <!-- Hair (gray, thinning crown) -->
  <path d="M26 30c0-7 5-12 10-12s10 5 10 12c-1-3-4-4-7-4M44 28c1 1 2 3 2 5" stroke="#9C9C9C" stroke-width="0.7" fill="url(#a3Hair)"/>
  <!-- Side hair tufts -->
  <path d="M26 32c-1 2-1 5 0 7M46 32c1 2 1 5 0 7" stroke="#A0A0A0" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  <!-- Wrinkle / brow line -->
  <path d="M30 31c1.5-1 3.5-1 5 0M37 31c1.5-1 3.5-1 5 0" stroke="#7A4A2A" stroke-width="0.6" opacity="0.6" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="32.4" cy="34" rx="0.9" ry="1.2" fill="#1A1A1A"/>
  <ellipse cx="39.6" cy="34" rx="0.9" ry="1.2" fill="#1A1A1A"/>
  <!-- Smile + chin crease -->
  <path d="M33 38c1.2 1.4 5 1.4 6 0" stroke="#7A3A28" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <path d="M34 42c1 0.6 3 0.6 4 0" stroke="#7A4A2A" stroke-width="0.5" opacity="0.6" fill="none" stroke-linecap="round"/>

  <!-- Hand resting on cane top -->
  <ellipse cx="58" cy="48" rx="3.2" ry="2.8" fill="url(#a3Skin)" filter="url(#a3Shadow)"/>
  <!-- Cane hook -->
  <path d="M58 48c5-1 6-7 1-8s-7 3-7 7"
        stroke="url(#a3Cane)" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <!-- Cane shaft -->
  <rect x="56.5" y="48" width="3" height="22" rx="1.5" fill="url(#a3Cane)" filter="url(#a3Shadow)"/>
  <!-- Cane wood-grain -->
  <path d="M57.5 50v18" stroke="#3A2415" stroke-width="0.4" opacity="0.5"/>
  <!-- Floor pad / rubber tip -->
  <ellipse cx="58" cy="71" rx="3.2" ry="1.4" fill="#1A1A1A"/>
</svg>
